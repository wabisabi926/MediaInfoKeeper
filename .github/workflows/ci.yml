name: Build MediaInfoKeeper

on:
  push:
    paths:
      - "MediaInfoKeeper.csproj"
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Mark this release as pre-release"
        type: boolean
        default: true
      tag_name:
        description: "Release tag (leave empty to auto-generate)"
        required: false
        type: string
      release_name:
        description: "Release name (leave empty to auto-generate)"
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore MediaInfoKeeper.csproj
 
      - name: Read version
        id: read_version
        shell: bash
        run: |
          app_version=$(cat MediaInfoKeeper.csproj | sed -ne "s/.*<AssemblyVersion>\\(.*\\)<\\/AssemblyVersion>.*/\\1/p")
          echo "app_version=$app_version" >> $GITHUB_ENV

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pre_release="${{ github.event.inputs.pre_release }}"
            input_tag="${{ github.event.inputs.tag_name }}"
            input_name="${{ github.event.inputs.release_name }}"

            if [[ -z "$input_tag" ]]; then
              release_tag="v${app_version}-pre.${{ github.run_number }}"
            else
              release_tag="$input_tag"
            fi

            if [[ -z "$input_name" ]]; then
              release_name="MediaInfoKeeper pre v${app_version}"
            else
              release_name="$input_name"
            fi
          else
            pre_release="false"
            release_tag="v${app_version}"
            release_name="MediaInfoKeeper v${app_version}"
          fi

          echo "pre_release=$pre_release" >> $GITHUB_ENV
          echo "release_tag=$release_tag" >> $GITHUB_ENV
          echo "release_name=$release_name" >> $GITHUB_ENV

      - name: Install ilrepack tool
        run: dotnet tool install -g dotnet-ilrepack --version 2.0.44

      - name: Build
        run: dotnet build MediaInfoKeeper.csproj -c Release --no-restore

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.release_name }}
          tag_name: ${{ env.release_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          overwrite_files: true
          prerelease: ${{ env.pre_release }}
          files: Build/bin/Release/net8.0/MediaInfoKeeper.dll
