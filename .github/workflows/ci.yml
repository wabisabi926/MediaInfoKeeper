name: Build MediaInfoKeeper

on:
  push:
    paths:
      - "MediaInfoKeeper.csproj"
  workflow_dispatch:
    inputs:
      pre_release:
        description: "Mark this release as pre-release"
        type: boolean
        default: true
      version:
        description: "Release version (for example: 1.6.6.10)"
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore MediaInfoKeeper.csproj
 
      - name: Read version
        id: read_version
        shell: bash
        run: |
          app_version=$(cat MediaInfoKeeper.csproj | sed -ne "s/.*<AssemblyVersion>\\(.*\\)<\\/AssemblyVersion>.*/\\1/p")
          echo "app_version=$app_version" >> $GITHUB_ENV

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            pre_release="${{ github.event.inputs.pre_release }}"
            input_version="${{ github.event.inputs.version }}"

            if [[ -z "$input_version" ]]; then
              base_tag="${app_version}"
            else
              base_tag="$input_version"
            fi

            release_tag="v${base_tag}-Pre.${{ github.run_number }}"
            release_name="MediaInfoKeeper Pre v${base_tag}"
          else
            pre_release="false"
            release_tag="v${app_version}"
            release_name="MediaInfoKeeper v${app_version}"
          fi

          echo "pre_release=$pre_release" >> $GITHUB_ENV
          echo "release_tag=$release_tag" >> $GITHUB_ENV
          echo "release_name=$release_name" >> $GITHUB_ENV

      - name: Generate release notes
        shell: bash
        run: |
          git fetch --force --tags

          previous_tag=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          notes_file="release-notes.md"

          {
            echo "## ${release_name}"
            echo
            echo "- Tag: \`${release_tag}\`"
            echo "- Commit: \`${GITHUB_SHA::7}\`"

            if [[ -n "$previous_tag" ]]; then
              echo "- Previous tag: \`${previous_tag}\`"
            else
              echo "- Previous tag: none"
            fi

            echo
            echo "### Changes"

            if [[ -n "$previous_tag" ]]; then
              git log "${previous_tag}..HEAD" --no-merges --pretty=format:'- %s (`%h`)'
            else
              git log --no-merges --pretty=format:'- %s (`%h`)'
            fi

            echo

            if [[ -n "$previous_tag" ]]; then
              echo
              echo "### Full Changelog"
              echo "https://github.com/${{ github.repository }}/compare/${previous_tag}...${release_tag}"
            fi
          } > "$notes_file"

      - name: Install ilrepack tool
        run: dotnet tool install -g dotnet-ilrepack --version 2.0.44

      - name: Build
        run: dotnet build MediaInfoKeeper.csproj -c Release --no-restore

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ env.release_name }}
          tag_name: ${{ env.release_tag }}
          target_commitish: ${{ github.sha }}
          body_path: release-notes.md
          overwrite_files: true
          prerelease: ${{ env.pre_release }}
          files: Build/bin/Release/net8.0/MediaInfoKeeper.dll
